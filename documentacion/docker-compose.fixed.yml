# docker-compose.yml mejorado para Moodle 5.2
# Incluye todas las variables de entorno necesarias y configuración optimizada

services:
  # Base de datos MariaDB
  db:
    image: mariadb:11.5
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    volumes:
      - db_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-allowed-packet=256M
      - --innodb-buffer-pool-size=512M
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Aplicación Moodle
  moodle:
    build:
      context: .
      dockerfile: documentacion/dockerfile.fixed
    container_name: moodle_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Configuración de Base de Datos
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 3306
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodleuser
      MOODLE_DB_PASS: moodlepass
      MOODLE_DB_PREFIX: mdl_
      
      # Configuración del Sitio
      MOODLE_URL: http://localhost:8080
      MOODLE_DATA_DIR: /var/www/moodledata
      MOODLE_REVERSE_PROXY: "false"
      
      # Configuración del Administrador (primera instalación)
      MOODLE_ADMIN_USER: admin
      MOODLE_ADMIN_PASS: Admin123!
      MOODLE_ADMIN_EMAIL: admin@example.com
      MOODLE_SITE_NAME: "Mi Sitio Moodle"
      MOODLE_SITE_SHORTNAME: moodle
      MOODLE_LANG: es
      
      # Configuración SMTP (opcional - descomentar y configurar si se necesita)
      # MOODLE_SMTP_HOST: smtp.gmail.com
      # MOODLE_SMTP_PORT: 587
      # MOODLE_SMTP_USER: tu_email@gmail.com
      # MOODLE_SMTP_PASS: tu_contraseña_de_aplicacion
      # MOODLE_SMTP_FROM: noreply@moodle.local
      # MOODLE_SMTP_SECURE: tls
      
      # Configuración PHP (opcional)
      PHP_MEMORY_LIMIT: 256M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
    
    volumes:
      - moodle_data:/var/www/moodledata
      - moodle_code:/var/www/html
    
    ports:
      - "8080:80"
    
    networks:
      - moodle_network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login/index.php"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  # phpMyAdmin (opcional - para administración de DB)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: moodle_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: moodleuser
      PMA_PASSWORD: moodlepass
    ports:
      - "8081:80"
    networks:
      - moodle_network

volumes:
  db_data:
    driver: local
  moodle_data:
    driver: local
  moodle_code:
    driver: local

networks:
  moodle_network:
    driver: bridge
